version: "3.8"
services:
  hecf:
    build: .
    container_name: hecf
    privileged: true
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /proc/cpuinfo:/proc/cpuinfo:ro
      - /proc/meminfo:/proc/meminfo:ro
      - ./metrics.csv:/app/metrics.csv
      - ./framework_status.json:/app/framework_status.json
      - ./priority_map.json:/app/priority_map.json
    environment:
      - HECF_TARGETS=""
      - HECF_MODE=full_hecf
    restart: unless-stopped
    networks:
      - hecf-network

  hecf-dashboard:
    build: .
    container_name: hecf-dashboard
    command: ["python", "dashboard.py"]
    ports:
      - "8092:8092"
    volumes:
      - ./metrics.csv:/app/metrics.csv:ro
      - ./framework_status.json:/app/framework_status.json
      - ./priority_map.json:/app/priority_map.json
      - /proc/cpuinfo:/proc/cpuinfo:ro
      - /proc/meminfo:/proc/meminfo:ro
    restart: unless-stopped
    networks:
      - hecf-network

  bench-json:
    build: ./http-arena
    container_name: bench-json
    ports:
      - "8000:8000"
    labels:
      - "hecf.priority=low"
    restart: unless-stopped
    networks:
      - hecf-network

networks:
  hecf-network:
    driver: bridge
